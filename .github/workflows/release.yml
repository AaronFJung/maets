name: Release

on:
    push:
        tags: ["v*"]

permissions:
    contents: write

jobs:
    publish:
        name: Publish GitHub Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Create release
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ github.ref_name }}
              run: |
                  if [[ "$TAG" == *-* ]]; then
                    gh release create "$TAG" --generate-notes --prerelease --latest=false
                  else
                    gh release create "$TAG" --generate-notes
                  fi
